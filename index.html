  <style>

.apk-install-popup {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;

  z-index: 99999;

  padding: 0 10px 0;

  display: none;

  pointer-events: none;
}


.apk-install-popup.show {
  display: block;
  pointer-events: auto;
}


/* ================= POPUP BOX ================= */

.apk-popup-box {

  position: relative;

  width: 100%;
  max-width: 680px;

  margin: 0 auto;

  border-radius: 20px 20px 0 0;

  overflow: hidden;

  background: rgba(255,255,255,0.94);

  box-shadow:
    0 -8px 35px rgba(0,0,0,0.35);

  backdrop-filter: blur(12px);

  -webkit-backdrop-filter: blur(12px);

  animation: apkPopupUp 0.35s ease;
}


@keyframes apkPopupUp {

  from {
    transform: translateY(100%);
    opacity:0;
  }

  to {
    transform: translateY(0);
    opacity:1;
  }

}


/* ================= BACKGROUND ================= */

.apk-popup-bg {

  position:absolute;

  inset:0;

  background:
    url("assets/icon/11web-192.png")
    center/cover no-repeat;

  opacity:0.14;

  filter:blur(6px);

  transform:scale(1.15);

}



/* ================= CONTENT ================= */

.apk-popup-content {

  position:relative;

  z-index:2;

  padding:12px 14px 12px;

}



/* ================= CLOSE ================= */

.apk-popup-close {

  position:absolute;

  top:10px;

  right:10px;


  width:38px;

  height:38px;


  border:none;

  border-radius:50%;


  background:rgba(0,0,0,0.35);


  color:#fff;


  font-size:30px;

  line-height:38px;


  text-align:center;

  cursor:pointer;

  z-index:5;

}



/* ================= HEADER ================= */

.apk-popup-head {

  display:flex;

  align-items:center;

  gap:10px;

  padding-right:42px;

}



/* ================= ICON ================= */

.apk-popup-icon {

  width:72px;

  height:72px;

  border-radius:16px;

  object-fit:cover;

  flex-shrink:0;


  box-shadow:
    0 5px 15px rgba(0,0,0,0.25);

}



/* ================= TITLE ================= */

.apk-popup-title {

  flex:1;

  min-width:0;


  font-size:20px;

  font-weight:900;

  line-height:1.2;


  color:#000;


  word-break:normal;


  overflow-wrap:break-word;


  text-shadow:
    0 1px 2px rgba(255,255,255,0.7);

}



/* ================= DIVIDER ================= */

.apk-popup-divider {

  width:100%;

  height:2px;

  background:rgba(0,0,0,0.15);


  margin:10px 0 10px;

}



/* ================= DOWNLOAD BUTTON ================= */

.apk-download-btn {

  width:70%;

  max-width:380px;


  margin:0 auto;


  display:flex;

  align-items:center;

  justify-content:center;


  gap:8px;

    0 8px 22px rgba(22,139,255,0.45);

}



.apk-download-btn span {

  <!-- ================= BOOT ================= -->
  <script>
    document.addEventListener("DOMContentLoaded", () => {

      const appRoot = document.getElementById("app-root");
      const appLoader = document.getElementById("app-loader");

      let appShown = false;

      function showApkPopup() {
        const popup = document.getElementById("apkInstallPopup");
        if (!popup) return;

        setTimeout(() => {
          popup.classList.add("show");
        }, 700);
      }

      function setupApkPopup() {
        const popup = document.getElementById("apkInstallPopup");
        const closeBtn = document.getElementById("apkPopupClose");

        if (!popup || !closeBtn) return;

        closeBtn.addEventListener("click", () => {
          popup.classList.remove("show");
        });
      }

      function showApp() {
        if (appShown) return;
        appShown = true;

        if (appRoot) {
          appRoot.style.display = "block";
        }

        if (appLoader) {
          appLoader.classList.add("hide");
          setTimeout(() => {
            appLoader.remove();
          }, 300);
        }

        document.body.classList.remove("app-booting");

        setupApkPopup();
        showApkPopup();
      }

      function waitForFirstRenderReady() {
        return new Promise((resolve) => {
          let done = false;

          const finish = () => {
            if (done) return;
            done = true;
            window.removeEventListener("APP_FIRST_RENDER_READY", onReady);
            clearTimeout(timer);
            resolve();
          };

          const onReady = () => finish();

          window.addEventListener("APP_FIRST_RENDER_READY", onReady, { once: true });

          const timer = setTimeout(() => {
            finish();
          }, 4500);
        });
      }

      async function boot() {

        console.log("🚀 BOOT START");

        try {

          window.State?.init?.();
          window.Events?.init?.();
          window.Utils?.init?.();

          window.Shell?.init?.();
          window.Topbar?.init?.();
          window.Navbar?.init?.();
          window.Menu?.init?.();

          if (window.Router?.init) {
            window.Router.init();
          }

          await waitForFirstRenderReady();

          showApp();

          console.log("✅ BOOT DONE");

        } catch (e) {
          console.error("❌ BOOT ERROR:", e);
          showApp();
        }
      }

      requestAnimationFrame(() => {
        boot();
      });

    });
  </script>
